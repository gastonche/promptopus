name: Bug report
description: Something isn't working as documented.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug. Please fill in as much as you can.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including the exact error or wrong output.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Steps, a minimal suite YAML, and the command you ran. The smaller the better.
      placeholder: |
        promptopus run my.suite.yaml
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: promptopus version
      placeholder: 'e.g. 0.1.1 (npx promptopus --version)'
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Node version / OS
      placeholder: 'e.g. Node 20.11, macOS 14'
    validations:
      required: true
